name: Release · Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

concurrency:
  group: prod-release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: Build & Verify
    uses: ./.github/workflows/reusable-build.yml

  release:
    name: Push image · GitHub Release · Deploy
    needs: verify
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: SimpleServer-war
          path: target

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=stable

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          generate_release_notes: true
          files: |
            target/SimpleServer.war

      - name: Deploy to production
        run: |
          echo "Deploying ghcr.io/${{ github.repository }}:${{ inputs.version }} to production"
          echo "TODO: real deploy step (SSH docker run / k8s rollout / docker compose pull)."
          {
            echo "## Production release v${{ inputs.version }}"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
